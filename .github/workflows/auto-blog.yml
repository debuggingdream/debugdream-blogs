name: Automated Weekly Blog Post

on:
  schedule:
    - cron: '15 3 * * 1' # Monday 9:00 AM Nepal Time (3:15 AM UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BLOG_GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow pyyaml

      - name: Run Blog Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_blog.py

      - name: Check for New Files
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.check_changes.outputs.changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.BLOG_GITHUB_TOKEN }}
        run: |
          git config --global user.name "DebugDream Bot"
          git config --global user.email "bot@debugdream.com"
          git add .
          git commit -m "docs: auto-generate weekly blog post [skip ci]"
          git push origin main

      - name: Trigger On-Demand Revalidation
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          curl -X GET "https://debugdream.com/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}"

      # - name: Trigger Cloudflare Deploy Hook
      #   if: steps.check_changes.outputs.changes == 'true'
      #   run: |
      #     curl -X POST ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
