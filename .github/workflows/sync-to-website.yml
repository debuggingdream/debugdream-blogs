name: Sync Blogs to Website

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4

      - name: Clone website repo
        run: |
          git clone https://x-access-token:${{ secrets.WEBSITE_REPO_TOKEN }}@github.com/debuggingdream/debugdream-website.git website

      - name: Sync content
        run: |
          rm -rf website/content/posts
          rm -rf website/content/ceo_posts
          rm -rf website/public/images
          rm -rf website/public/ceo_images

          mkdir -p website/content/posts
          mkdir -p website/content/ceo_posts
          mkdir -p website/public/images
          mkdir -p website/public/ceo_images

          cp -r posts/. website/content/posts/
          cp -r ceo_posts/. website/content/ceo_posts/
          cp -r images/. website/public/images/
          cp -r ceo_images/. website/public/ceo_images/

      - name: Commit and push to website repo
        run: |
          cd website
          git config user.name "DebugDream Bot"
          git config user.email "bot@debugdream.com"

          git add .

          git commit -m "auto: sync blog content" || echo "no changes"

          git push https://x-access-token:${{ secrets.WEBSITE_REPO_TOKEN }}@github.com/debuggingdream/debugdream-website.git master